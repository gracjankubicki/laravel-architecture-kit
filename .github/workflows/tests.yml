name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']
        laravel: ['12.*', '13.*']

    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Validate composer
        run: composer validate --strict

      - name: Lint
        run: vendor/bin/pint --test

      - name: Test
        run: vendor/bin/phpunit

  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: xdebug

      - name: Install dependencies
        run: |
          composer require "laravel/framework:13.*" --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Test with coverage
        run: vendor/bin/phpunit --coverage-clover build/logs/clover.xml

      - name: Generate coverage badge
        run: php bin/generate-coverage-badge build/logs/clover.xml art/coverage.svg

      - name: Commit coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet -- art/coverage.svg; then
            echo "Coverage badge is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add art/coverage.svg
          git commit -m "Update coverage badge [skip ci]"
          git push
